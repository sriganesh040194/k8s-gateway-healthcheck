apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-gateway-healthcheck
  namespace: epdi-tooling           # adjust to your target namespace
  labels:
    app: k8s-gateway-healthcheck
    app.kubernetes.io/name: k8s-gateway-healthcheck
    app.kubernetes.io/component: healthcheck
  annotations:
    # ── NGINX ingress controller ───────────────────────────────────────────
    kubernetes.io/ingress.class: "nginx"

    # Rate limiting — prevent probe storms
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"

    nginx.ingress.kubernetes.io/proxy-buffering: "on"

    # SSL/TLS — enable if your cluster has cert-manager
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"

spec:
  ingressClassName: nginx

  # Uncomment if using TLS termination at ingress
  # tls:
  #   - hosts:
  #       - healthcheck.internal.yourdomain.com
  #     secretName: k8s-gateway-healthcheck-tls

  rules:
    - host: healthcheck.internal.yourdomain.com   # replace with your internal DNS
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k8s-gateway-healthcheck
                port:
                  name: http
