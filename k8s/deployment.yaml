apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-gateway-healthcheck
  namespace: epdi-tooling           # adjust to your target namespace
  labels:
    app: k8s-gateway-healthcheck
    app.kubernetes.io/name: k8s-gateway-healthcheck
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: healthcheck
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2                        # minimum 2 for HA; HPA will scale beyond this
  selector:
    matchLabels:
      app: k8s-gateway-healthcheck
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0              # zero-downtime deploys
  template:
    metadata:
      labels:
        app: k8s-gateway-healthcheck
        app.kubernetes.io/name: k8s-gateway-healthcheck
      annotations:
        prometheus.io/scrape: "false"  # flip to true if you add /metrics
    spec:
      # ── Security ──────────────────────────────────────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      # ── Topology spread for AZ resilience ─────────────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: k8s-gateway-healthcheck

      terminationGracePeriodSeconds: 30

      containers:
        - name: k8s-gateway-healthcheck
          image: your-acr.azurecr.io/k8s-gateway-healthcheck:1.0.0   # replace with your ACR
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            - name: PORT
              value: "8080"
            - name: APP_NAME
              value: "k8s-gateway-healthcheck"
            - name: APP_VERSION
              value: "1.0.0"
            - name: ENVIRONMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace   # uses namespace as env hint
            - name: LIVENESS_PATH
              value: "/healthz"
            - name: READINESS_PATH
              value: "/readyz"
            - name: STARTUP_PATH
              value: "/startupz"
            - name: FULL_HEALTH_PATH
              value: "/health"

          # ── Probes ────────────────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /startupz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 10      # allow up to 30s for startup

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2

          # ── Resources ─────────────────────────────────────────────────────
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

          # ── Security context ──────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      # ── Image pull from ACR using managed identity or pull secret ──────────
      # imagePullSecrets:
      #   - name: acr-pull-secret

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: k8s-gateway-healthcheck
                topologyKey: kubernetes.io/hostname
