{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "k8s-gateway-healthcheck.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "k8s-gateway-healthcheck.commonLabels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/limit-rps: {{ .Values.ingress.limitRps | quote }}
    nginx.ingress.kubernetes.io/limit-connections: {{ .Values.ingress.limitConnections | quote }}
    # Security response headers — hardcoded as a non-negotiable security baseline
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer" always;
    {{- if and .Values.ingress.tls.enabled .Values.ingress.tls.certManagerIssuer }}
    cert-manager.io/cluster-issuer: {{ .Values.ingress.tls.certManagerIssuer | quote }}
    {{- end }}
spec:
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: {{ include "k8s-gateway-healthcheck.fullname" . }}
                port:
                  name: http
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: {{ include "k8s-gateway-healthcheck.fullname" . }}
                port:
                  name: http
          - path: /startupz
            pathType: Exact
            backend:
              service:
                name: {{ include "k8s-gateway-healthcheck.fullname" . }}
                port:
                  name: http
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "k8s-gateway-healthcheck.fullname" . }}
                port:
                  name: http
{{- end }}
