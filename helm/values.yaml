# -- Number of pod replicas
replicaCount: 2

image:
  # -- Container registry hostname
  registry: ghcr.io
  # -- Image repository path within the registry
  repository: k8s-gateway-healthcheck
  # -- Image tag; override at deploy time with --set image.tag=$SHA
  tag: "1.0.0"
  # -- Image pull policy
  pullPolicy: Always

# -- Optional list of imagePullSecret names for private registry access
imagePullSecrets: []

# -- Override the chart name used in resource naming
nameOverride: ""
# -- Override the full name (release + chart) used in resource naming
fullnameOverride: ""

# -- Kubernetes namespace to deploy into
namespace: default

service:
  # -- Service type (ClusterIP recommended; ingress handles external traffic)
  type: ClusterIP
  # -- Service port exposed within the cluster
  port: 80

ingress:
  # -- Enable or disable the Ingress resource
  enabled: true
  # -- Ingress class name
  className: nginx
  # -- Ingress hostname
  host: healthcheck.example.com
  # -- Rate limiting: requests per second per client IP
  limitRps: "50"
  # -- Rate limiting: simultaneous connections per client IP
  limitConnections: "20"
  tls:
    # -- Enable TLS termination on the Ingress
    enabled: false
    # -- Name of the TLS secret (must exist or be managed by cert-manager)
    secretName: k8s-gateway-healthcheck-tls
    # -- cert-manager ClusterIssuer name; set to enable auto-provisioning
    certManagerIssuer: ""

# -- Application environment variables
env:
  # -- HTTP port the Go server listens on (must match containerPort 8080)
  port: "8080"
  # -- Application name injected into the process and shown in /health response
  appName: k8s-gateway-healthcheck
  # -- ENVIRONMENT is sourced from metadata.namespace via the Downward API
  # -- Health endpoint paths — must match the probe paths below
  livenessPath: /healthz
  readinessPath: /readyz
  startupPath: /startupz
  fullHealthPath: /health

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

# -- Startup probe timing (path configured via env.startupPath)
startupProbe:
  initialDelaySeconds: 2
  periodSeconds: 3
  failureThreshold: 10

# -- Liveness probe timing (path configured via env.livenessPath)
livenessProbe:
  initialDelaySeconds: 5
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

# -- Readiness probe timing (path configured via env.readinessPath)
readinessProbe:
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2

# -- Termination grace period in seconds
terminationGracePeriodSeconds: 30

# -- Additional pod annotations
podAnnotations:
  prometheus.io/scrape: "false"

# -- Additional pod labels
podLabels: {}

# -- Node selector constraints
nodeSelector: {}

# -- Pod tolerations
tolerations: []

# -- Topology spread constraints for AZ resilience
topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: topology.kubernetes.io/zone
  whenUnsatisfiable: DoNotSchedule

# -- Pod anti-affinity (preferred, spread across nodes)
podAntiAffinity:
  enabled: true
  weight: 100
